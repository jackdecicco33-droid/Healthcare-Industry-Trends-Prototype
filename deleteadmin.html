<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Employee Industry Insights</title>
  <style>
    :root {
      --green: #5b9b3f;
      --green-dark: #3f7b2a;
      --ink: #10263f;
      --muted: #5f7182;
      --border: #d7e4f0;
      --bg: #eef3f9;
      --surface: #ffffff;
      --danger: #b42318;
      --danger-dark: #8f1d14;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    h1 {
      margin: 0 0 10px;
      color: #244c88;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 0;
    }

    .intro {
      color: var(--muted);
      margin-bottom: 24px;
      max-width: 780px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 14px 34px rgba(13, 44, 82, 0.08);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 800;
      color: var(--ink);
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(91, 155, 63, 0.16);
      outline: none;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .load-button {
      background: var(--green);
      color: #fff;
    }

    .load-button:hover {
      background: var(--green-dark);
    }

    .delete-button {
      background: var(--danger);
      color: #fff;
    }

    .delete-button:hover {
      background: var(--danger-dark);
    }

    .note {
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      min-height: 24px;
      margin-bottom: 16px;
      color: var(--muted);
      font-weight: 700;
    }

    .insight-list {
      display: grid;
      gap: 14px;
    }

    .insight-card {
      display: grid;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      background: #fbfdff;
    }

    .insight-card-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
    }

    .insight-card h2 {
      margin: 0;
      color: #244c88;
      font-size: 1.25rem;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      background: #edf5fb;
      color: #244c88;
      padding: 4px 10px;
      font-weight: 800;
      font-size: 0.86rem;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 16px;
    }

    .meta-grid p,
    .insight-card > p {
      color: var(--muted);
    }

    a {
      color: #244c88;
      font-weight: 800;
    }

    @media (max-width: 720px) {
      .controls,
      .meta-grid {
        grid-template-columns: 1fr;
      }

      .insight-card-header {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Delete Employee Industry Insights</h1>
    <p class="intro">
      Load and delete employee insight copies stored in Supabase. This does not remove the original Microsoft Forms or Excel response.
    </p>

    <section class="panel" aria-labelledby="adminControlsTitle">
      <h2 id="adminControlsTitle">Supabase Responses</h2>
      <p class="note">
        Deleting an insight here removes it from the website/backend display only.
      </p>

      <div class="controls">
        <label>
          Supabase table
          <input value="public.employee_insights" readonly>
        </label>
        <button id="loadResponsesButton" class="load-button" type="button">Load Responses</button>
      </div>

      <p id="adminStatus" class="status" role="status" aria-live="polite">Load responses from Supabase.</p>
      <div id="adminInsightsList" class="insight-list" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    console.log("deleteadmin page loaded");

    const SUPABASE_URL = "https://YOUR_PROJECT_REF.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const INSIGHTS_SCHEMA = "public";
    const INSIGHTS_TABLE = "employee_insights";

    const list = document.getElementById("adminInsightsList");
    const status = document.getElementById("adminStatus");
    const loadButton = document.getElementById("loadResponsesButton");

    let currentRows = [];
    let hasCreatedAtColumn = true;
    let hasSoftDeleteColumn = true;
    let supabaseClient = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function normalizeAudience(value) {
      if (Array.isArray(value)) return value.join(", ");
      if (typeof value !== "string") return value || "";

      const trimmed = value.trim();
      if (trimmed.startsWith("[") && trimmed.endsWith("]")) {
        try {
          const parsed = JSON.parse(trimmed);
          if (Array.isArray(parsed)) return parsed.join(", ");
        } catch {
          return trimmed;
        }
      }

      return trimmed;
    }

    function hasSupabaseConfig() {
      return SUPABASE_URL.startsWith("https://") &&
        SUPABASE_URL.includes(".supabase.co") &&
        SUPABASE_ANON_KEY &&
        SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
    }

    function getSupabaseClient() {
      if (!hasSupabaseConfig()) {
        throw new Error("Supabase URL or anon key is not configured in deleteadmin.html.");
      }

      if (!window.supabase?.createClient) {
        throw new Error("Supabase browser client failed to load from the CDN.");
      }

      if (!supabaseClient) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      return supabaseClient;
    }

    function table() {
      return getSupabaseClient().schema(INSIGHTS_SCHEMA).from(INSIGHTS_TABLE);
    }

    function isMissingColumn(error, columnName) {
      const combined = `${error?.message || ""} ${error?.details || ""} ${error?.hint || ""}`.toLowerCase();
      return error?.code === "42703" || combined.includes(columnName.toLowerCase());
    }

    function formatSupabaseError(action, error) {
      return [
        `${action} failed.`,
        error?.message,
        error?.details,
        error?.hint,
        error?.code ? `Code: ${error.code}` : ""
      ].filter(Boolean).join(" ");
    }

    function showError(message) {
      status.textContent = message;
      list.innerHTML = `<p>${escapeHtml(message)}</p>`;
    }

    async function queryRows() {
      let useSoftDeleteFilter = hasSoftDeleteColumn;
      let orderColumn = hasCreatedAtColumn ? "created_at" : "id";

      for (let attempt = 0; attempt < 4; attempt += 1) {
        let query = table().select("*");

        if (useSoftDeleteFilter) {
          query = query.or("is_deleted.eq.false,is_deleted.is.null");
        }

        query = query.order(orderColumn, { ascending: false });

        const { data, error } = await query;

        if (!error) {
          hasSoftDeleteColumn = useSoftDeleteFilter;
          hasCreatedAtColumn = orderColumn === "created_at";
          return data || [];
        }

        console.error("Supabase load error", error);

        if (useSoftDeleteFilter && isMissingColumn(error, "is_deleted")) {
          hasSoftDeleteColumn = false;
          useSoftDeleteFilter = false;
          continue;
        }

        if (orderColumn === "created_at" && isMissingColumn(error, "created_at")) {
          hasCreatedAtColumn = false;
          orderColumn = "id";
          continue;
        }

        throw error;
      }

      return [];
    }

    function getField(row, keys) {
      for (const key of keys) {
        if (row?.[key] !== undefined && row[key] !== null && row[key] !== "") {
          return row[key];
        }
      }

      return "";
    }

    function renderField(label, value) {
      if (value === undefined || value === null || value === "") return "";
      return `<p><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value)}</p>`;
    }

    function renderRows(rows) {
      if (!rows.length) {
        list.innerHTML = "<p>No employee insights are currently stored in Supabase.</p>";
        return;
      }

      list.innerHTML = rows.map(row => {
        const id = getField(row, ["id"]);
        const name = getField(row, ["name"]);
        const role = getField(row, ["role"]);
        const sourceType = getField(row, ["source_type", "sourceType"]);
        const title = getField(row, ["title"]) || "Untitled Employee Insight";
        const description = getField(row, ["description"]);
        const link = getField(row, ["link", "url"]);
        const takeaways = getField(row, ["takeaways", "key_takeaway"]);
        const whyItMatters = getField(row, ["why_it_matters", "whyItMatters"]);
        const audience = normalizeAudience(getField(row, ["audience"]));
        const createdAt = getField(row, ["created_at"]);
        const submittedAt = getField(row, ["submitted_at", "submittedAt"]);

        return `
        <article class="insight-card" data-insight-id="${escapeAttribute(id)}">
          <div class="insight-card-header">
            <div>
              <span class="tag">${escapeHtml(sourceType || "Insight")}</span>
              <h2>${escapeHtml(title)}</h2>
            </div>
            <button class="delete-button" type="button" data-id="${escapeAttribute(id)}">Delete</button>
          </div>
          <div class="meta-grid">
            ${renderField("ID", id)}
            ${renderField("Name", name)}
            ${renderField("Role / Service Line", role)}
            ${renderField("Source Type", sourceType)}
            ${renderField("Best For", audience)}
            ${renderField("Created", createdAt)}
            ${renderField("Submitted", submittedAt)}
          </div>
          ${renderField("Description", description)}
          ${renderField("Key Takeaway", takeaways)}
          ${renderField("Why It Matters", whyItMatters)}
          ${link ? `<a href="${escapeAttribute(link)}" target="_blank" rel="noopener noreferrer">View Source</a>` : ""}
        </article>
      `;
      }).join("");
    }

    async function loadResponses() {
      console.log("admin insights fetch started");
      console.log("Supabase table", `${INSIGHTS_SCHEMA}.${INSIGHTS_TABLE}`);
      status.textContent = "Loading responses...";
      list.innerHTML = "";

      try {
        currentRows = await queryRows();
        console.log("admin insights data", currentRows);
        renderRows(currentRows);
        status.textContent = `Loaded ${currentRows.length} employee insight${currentRows.length === 1 ? "" : "s"} from Supabase.`;
      } catch (error) {
        console.error(error);
        showError(formatSupabaseError("Load", error));
      }
    }

    async function deleteInsight(id) {
      console.log("delete button clicked");
      console.log("id being deleted", id);

      if (!id) {
        status.textContent = "Unable to delete this response because it is missing an id.";
        return;
      }

      const confirmed = window.confirm("Delete this insight from Supabase and the public website display?");
      if (!confirmed) return;

      console.log("Supabase row id being deleted", id);
      status.textContent = "Deleting response...";

      try {
        let deletedData = null;

        if (hasSoftDeleteColumn) {
          const { data, error } = await table()
            .update({ is_deleted: true })
            .eq("id", id)
            .select("*")
            .maybeSingle();

          if (error && isMissingColumn(error, "is_deleted")) {
            console.warn("is_deleted column not found; falling back to hard delete.", error);
            hasSoftDeleteColumn = false;
          } else if (error) {
            throw error;
          } else {
            deletedData = data;
          }
        }

        if (!hasSoftDeleteColumn) {
          const { data, error } = await table()
            .delete()
            .eq("id", id)
            .select("*");

          if (error) {
            throw error;
          }

          deletedData = data;
        }

        const card = list.querySelector(`[data-insight-id="${CSS.escape(id)}"]`);
        if (card) card.remove();
        currentRows = currentRows.filter((row) => String(row.id) !== String(id));
        console.log("delete response JSON", deletedData);
        status.textContent = "Insight deleted from Supabase. Refreshing list...";
        await loadResponses();
        console.log("admin list refreshed after delete");
        status.textContent = "Insight deleted from Supabase and removed from the website display.";
      } catch (error) {
        console.error(error);
        showError(formatSupabaseError("Delete", error));
      }
    }

    loadButton.addEventListener("click", () => loadResponses());
    list.addEventListener("click", event => {
      const button = event.target.closest("button[data-id]");
      if (!button) return;
      deleteInsight(button.getAttribute("data-id"));
    });
  </script>
</body>
</html>
